<!DOCTYPE html>
<html>


<head>

 <meta charset="utf-8">
 <title>Artificial Horizon</title>
 <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>  <!-- imported MQTT library -->

 <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
    canvas {
      display: block;
    }
  </style>

</head>

<body>

<canvas id="hud"></canvas>

<script>

const canvas = document.getElementById("hud");
const ctx = canvas.getContext("2d");

function sizeChange() {

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize", sizeChange);
sizeChange();

let roll = 0;  // sensor values from MQTT
let pitch = 0;
let stabilizedRoll = 0;  // stabilized values
let stabilizedPitch = 0;
let ax = 0, ay = 0, az = 1;  // accelerometer data
let gForce = 1;

let error = 0;  // variables for warnings
let cooldown = 0;

// MQTT

const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

client.on("connect", () => {
  client.subscribe("wio/horizon");  // subscribe to the specific MQTT topic
});

client.on("message", (t, msg) => {
  let downloadedData;
  try {
    downloadedData = JSON.parse(msg.toString());  // data conversion
  } catch (e) {
    return;
  }
  // +180 because the sensor is mounted upside down on the board
  if (typeof downloadedData.roll === "number") roll = angleLimits(downloadedData.roll + 180);  // viarable updates
  if (typeof downloadedData.pitch === "number") pitch = downloadedData.pitch;
  if (typeof downloadedData.ax === "number") ax = downloadedData.ax;
  if (typeof downloadedData.ay === "number") ay = downloadedData.ay;
  if (typeof downloadedData.az === "number") az = downloadedData.az;
});

function angleLimits(a) {

  a = a % 360;
  if (a > 180) a -= 360;
  if (a < -180) a += 360;
  return a;
}

function calculateFg(ax, ay, az) {

  return Math.sqrt(ax*ax + ay*ay + az*az);
}

// visualisation 

function visualiseHorizon(w, h, rollDeg, pitchVal) {

  const cx = w / 2;
  const scale = 10;

  ctx.save();
  ctx.translate(cx, h / 2);  // view movements
  ctx.rotate(rollDeg * Math.PI / 180);
  ctx.translate(0, pitchVal * scale);

  ctx.fillStyle = "#38ACEC";
  ctx.fillRect(-5000, -5000, 10000, 5000);
  ctx.fillStyle = "#836539";
  ctx.fillRect(-5000, 0, 10000, 5000);
  ctx.strokeStyle = "white";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-5000, 0);
  ctx.lineTo(5000, 0);
  ctx.stroke();

  ctx.restore();
}

function visualiseScale(w, h, rollDeg, pitchVal) {

  const scale = 10;

  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(rollDeg * Math.PI / 180);

  ctx.strokeStyle = "white";
  ctx.fillStyle = "white";
  ctx.font = "20px monospace";
  ctx.lineWidth = 4;

  for (let i = -90; i <= 90; i += 10) {

    const y = -(i - pitchVal) * scale;  // calculating position

    ctx.beginPath();
    if (i === 0) {
      ctx.moveTo(-80, y);
      ctx.lineTo(80, y);
    } else {
      ctx.moveTo(-50, y);
      ctx.lineTo(50, y);
    }
    ctx.stroke();
  
    ctx.fillText(i, 90, y + 5);
  }

  ctx.restore();
}

function visualiseAircraft(w, h) {

  const cx = w / 2;
  const cy = h / 2;

  ctx.strokeStyle = "#FDEE00";
  ctx.lineWidth = 10;

  ctx.beginPath();
  ctx.moveTo(cx - 40, cy);
  ctx.lineTo(cx - 10, cy);
  ctx.moveTo(cx + 10, cy);
  ctx.lineTo(cx + 40, cy);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx - 10, cy);
  ctx.lineTo(cx + 10, cy);
  ctx.stroke();
}

function visualiseWarning(w, h, pitchVal, rollVal) {

  let warning = null;

  if (pitchVal < -30) warning = "PULL UP";
  else if (pitchVal > 30) warning = "STALL";

  if (Math.abs(rollVal) > 45) warning = "BANK ANGLE";

  if (gForce > 2.0) warning = "G LIMIT";

  if (!warning) {
    cooldown = 0;
    return;
  }

  error += 0.15;  // blinking
  const visible = Math.sin(error) > 0;
  if (!visible) return;

  ctx.save();
  ctx.fillStyle = "red";
  ctx.font = "bold 60px monospace";
  ctx.textAlign = "center";
  ctx.fillText(warning, w / 2, h / 2 - 120);
  ctx.restore();
}

function visualiseHUD(w, h) {

  ctx.fillStyle = "#FDEE00";
  ctx.font = "bold 18px monospace";
  ctx.fillText("ROLL: " + stabilizedRoll.toFixed(1), 20, 30);
  ctx.fillText("PITCH: " + stabilizedPitch.toFixed(1), 20, 50);
  ctx.fillText("G: " + gForce.toFixed(2), 20, 70);
}

// main loop

function animate() {

  requestAnimationFrame(animate);

  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  let dr = roll - stabilizedRoll;  // shortest path for rotation
  if (dr > 180) dr -= 360;
  if (dr < -180) dr += 360;

  stabilizedRoll += dr * 0.1;
  stabilizedPitch += (pitch - stabilizedPitch) * 0.1;

  gForce = calculateFg(ax, ay, az);

  visualiseHorizon(w, h, stabilizedRoll, stabilizedPitch);
  visualiseScale(w, h, stabilizedRoll, stabilizedPitch);
  visualiseAircraft(w, h);
  visualiseWarning(w, h, stabilizedPitch, stabilizedRoll);
  visualiseHUD(w, h);
}

animate();

</script>

</body>

</html>
